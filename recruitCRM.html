// ============================================================
// FEATURE 1: BD PIPELINE (Client pipeline board)
// ============================================================
const BD_STAGES=["Prospect","Qualified","Proposal Sent","Terms Agreed","Live Client","Cold"];
const BD_COLORS={"Prospect":"#eef1ff","Qualified":"#faeeda","Proposal Sent":"#e6f1fb","Terms Agreed":"#fbeaf0","Live Client":"#eaf3de","Cold":"#f1efe8"};
const BD_FG={"Prospect":"#4f6ef7","Qualified":"#854f0b","Proposal Sent":"#185fa5","Terms Agreed":"#993556","Live Client":"#3b6d11","Cold":"#5f5e5a"};

function BDPipelinePage(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const blank={company_name:"",contact_name:"",contact_email:"",contact_phone:"",stage:"Prospect",notes:"",next_action:"",next_action_date:"",value:""};
  const [f,setF]=useState(blank);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const load=useCallback(async()=>{
    setLoading(true);
    const{data}=await db.from("client_pipeline").select("*").order("created_at",{ascending:false});
    setRows(data||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    if(!f.company_name.trim())return setErr("Company name required");
    setSaving(true);setErr("");
    const payload={...f,value:f.value?parseFloat(f.value):null};
    const{error}=editing
      ?await db.from("client_pipeline").update(payload).eq("id",editing.id)
      :await db.from("client_pipeline").insert(payload);
    if(error)setErr(error.message);else{setModal(false);setEditing(null);setF(blank);load();}
    setSaving(false);
  };

  const updateStage=async(id,stage)=>{
    await db.from("client_pipeline").update({stage}).eq("id",id);load();
  };

  const del=async id=>{if(!confirm("Delete this lead?"))return;await db.from("client_pipeline").delete().eq("id",id);load();};

  const openEdit=r=>{setEditing(r);setF({...r,value:r.value||""});setModal(true);};

  const byStage=BD_STAGES.reduce((a,s)=>{a[s]=(rows||[]).filter(r=>r.stage===s);return a;},{});

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:15,fontWeight:500}}>BD Pipeline</div>
      <button className="btn-a" onClick={()=>{setEditing(null);setF(blank);setModal(true);}}>+ Add Lead</button>
    </div>
    {loading?<Spin/>:
    <div style={{overflowX:"auto",paddingBottom:8}}>
      <div style={{display:"flex",gap:10,minWidth:900}}>
      {BD_STAGES.map(stage=><div key={stage} style={{flex:1,minWidth:148,background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",overflow:"hidden"}}>
        <div style={{background:BD_COLORS[stage],color:BD_FG[stage],padding:"8px 12px",fontSize:11,fontWeight:600,display:"flex",justifyContent:"space-between"}}>
          <span>{stage}</span><span>{byStage[stage].length}</span>
        </div>
        <div style={{padding:8,minHeight:60}}>
          {byStage[stage].map(r=><div key={r.id} style={{background:"var(--bg2)",borderRadius:8,padding:"10px 12px",marginBottom:8,border:"0.5px solid var(--br)"}}>
            <div style={{fontWeight:500,fontSize:13,marginBottom:2}}>{r.company_name}</div>
            {r.contact_name&&<div style={{fontSize:11,color:"var(--t2)"}}>{r.contact_name}</div>}
            {r.next_action&&<div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>→ {r.next_action}</div>}
            {r.value&&<div style={{fontSize:11,color:"#3b6d11",marginTop:2}}>£{parseFloat(r.value).toLocaleString()}</div>}
            <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
              <select value={r.stage} onChange={e=>updateStage(r.id,e.target.value)} style={{fontSize:10,padding:"2px 6px",width:"auto",flex:1}}>
                {BD_STAGES.map(s=><option key={s}>{s}</option>)}
              </select>
              <button className="btn-o" style={{fontSize:10,padding:"2px 7px"}} onClick={()=>openEdit(r)}>Edit</button>
              <button className="btn-d" style={{fontSize:10,padding:"2px 7px"}} onClick={()=>del(r.id)}>✕</button>
            </div>
          </div>)}
        </div>
      </div>)}
      </div>
    </div>}
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>{editing?"Edit Lead":"Add BD Lead"}</h3>
        <div className="fr"><label>Company Name *</label><input value={f.company_name} onChange={s("company_name")} placeholder="Company name"/></div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Contact Name</label><input value={f.contact_name} onChange={s("contact_name")}/></div>
          <div className="fr" style={{margin:0}}><label>Stage</label><select value={f.stage} onChange={s("stage")}>{BD_STAGES.map(x=><option key={x}>{x}</option>)}</select></div>
        </div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Email</label><input value={f.contact_email} onChange={s("contact_email")}/></div>
          <div className="fr" style={{margin:0}}><label>Phone</label><input value={f.contact_phone} onChange={s("contact_phone")}/></div>
        </div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Next Action</label><input value={f.next_action} onChange={s("next_action")}/></div>
          <div className="fr" style={{margin:0}}><label>Action Date</label><input type="date" value={f.next_action_date} onChange={s("next_action_date")}/></div>
        </div>
        <div className="fr"><label>Est. Value (£)</label><input value={f.value} onChange={s("value")} placeholder="10000"/></div>
        <div className="fr"><label>Notes</label><textarea value={f.notes} onChange={s("notes")}/></div>
        {err&&<div className="err">{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn-o" onClick={()=>setModal(false)}>Cancel</button>
          <button className="btn-a" onClick={save} disabled={saving}>{saving?"Saving…":"Save"}</button>
        </div>
      </div>
    </div>}
  </div>;
}

// FEATURE 2: SUBMITTALS
// ============================================================
const SUBMITTAL_STATUSES=["Submitted","Shortlisted","Interview Booked","Offer Made","Placed","Rejected"];

function SubmittalsPage(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [candidates,setCandidates]=useState([]);
  const [jobs,setJobs]=useState([]);
  const blank={candidate_id:"",job_id:"",status:"Submitted",submitted_date:new Date().toISOString().split("T")[0],client_feedback:"",interview_date:"",notes:""};
  const [f,setF]=useState(blank);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const load=useCallback(async()=>{
    setLoading(true);
    const[{data:sub},{data:cands},{data:js}]=await Promise.all([
      db.from("submittals").select("*,candidates(name,role),jobs(title,companies(name))").order("created_at",{ascending:false}),
      db.from("candidates").select("id,name,role").order("name"),
      db.from("jobs").select("id,title,companies(name)").order("title"),
    ]);
    setRows(sub||[]);setCandidates(cands||[]);setJobs(js||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    if(!f.candidate_id||!f.job_id)return setErr("Select candidate and job");
    setSaving(true);setErr("");
    const{error}=await db.from("submittals").insert(f);
    if(error)setErr(error.message);else{setModal(false);setF(blank);load();}
    setSaving(false);
  };

  const updateStatus=async(id,status)=>{
    await db.from("submittals").update({status}).eq("id",id);load();
  };

  const statusColor=st=>({
    "Submitted":"#eef1ff","Shortlisted":"#faeeda","Interview Booked":"#e6f1fb",
    "Offer Made":"#fbeaf0","Placed":"#eaf3de","Rejected":"#fcebeb"
  }[st]||"#f1efe8");

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:15,fontWeight:500}}>Submittals</div>
      <button className="btn-a" onClick={()=>{setF(blank);setModal(true);}}>+ New Submittal</button>
    </div>
    {loading?<Spin/>:
    rows.length===0?<div style={{padding:"40px 0",textAlign:"center",color:"var(--t3)",fontSize:13}}>No submittals yet. Click "+ New Submittal" to log your first CV send.</div>:
    <table style={{width:"100%",borderCollapse:"collapse",background:"var(--bg)",borderRadius:10,overflow:"hidden",border:"0.5px solid var(--br)",tableLayout:"fixed"}}>
      <colgroup>
        <col style={{width:"18%"}}/><col style={{width:"22%"}}/><col style={{width:"16%"}}/>
        <col style={{width:"11%"}}/><col style={{width:"14%"}}/><col style={{width:"19%"}}/>
      </colgroup>
      <thead><tr>
        <th className="th">Candidate</th><th className="th">Role</th><th className="th">Company</th>
        <th className="th">Submitted</th><th className="th">Status</th><th className="th">Feedback</th>
      </tr></thead>
      <tbody>{rows.map(r=><tr key={r.id}>
        <td className="td" style={{fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.candidates?.name||"—"}</td>
        <td className="td" style={{color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.jobs?.title||"—"}</td>
        <td className="td" style={{color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.jobs?.companies?.name||"—"}</td>
        <td className="td" style={{color:"var(--t3)"}}>{r.submitted_date||"—"}</td>
        <td className="td">
          <select value={r.status} onChange={e=>updateStatus(r.id,e.target.value)} style={{fontSize:11,padding:"2px 6px",background:statusColor(r.status),border:"none",borderRadius:6,fontWeight:500}}>
            {SUBMITTAL_STATUSES.map(x=><option key={x}>{x}</option>)}
          </select>
        </td>
        <td className="td" style={{fontSize:11,color:"var(--t2)",maxWidth:200}}>{r.client_feedback||"—"}</td>
      </tr>)}</tbody>
    </table>}
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>New Submittal</h3>
        <div className="fr"><label>Candidate *</label>
          <select value={f.candidate_id} onChange={s("candidate_id")}>
            <option value="">Select candidate…</option>
            {candidates.map(c=><option key={c.id} value={c.id}>{c.name} — {c.role}</option>)}
          </select>
        </div>
        <div className="fr"><label>Job *</label>
          <select value={f.job_id} onChange={s("job_id")}>
            <option value="">Select job…</option>
            {jobs.map(j=><option key={j.id} value={j.id}>{j.title} — {j.companies?.name||""}</option>)}
          </select>
        </div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Status</label><select value={f.status} onChange={s("status")}>{SUBMITTAL_STATUSES.map(x=><option key={x}>{x}</option>)}</select></div>
          <div className="fr" style={{margin:0}}><label>Submitted Date</label><input type="date" value={f.submitted_date} onChange={s("submitted_date")}/></div>
        </div>
        <div className="fr"><label>Interview Date (if booked)</label><input type="datetime-local" value={f.interview_date} onChange={s("interview_date")}/></div>
        <div className="fr"><label>Client Feedback</label><textarea value={f.client_feedback} onChange={s("client_feedback")} placeholder="Client's response…"/></div>
        <div className="fr"><label>Notes</label><textarea value={f.notes} onChange={s("notes")}/></div>
        {err&&<div className="err">{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn-o" onClick={()=>setModal(false)}>Cancel</button>
          <button className="btn-a" onClick={save} disabled={saving}>{saving?"Saving…":"Submit"}</button>
        </div>
      </div>
    </div>}
  </div>;
}

function EmailSequencesPage(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [candidates,setCandidates]=useState([]);
  const [companies,setCompanies]=useState([]);
  const blank={name:"",target_type:"candidate",target_id:"",target_name:"",steps:[
    {day:0,subject:"Introduction",body:"Hi {{name}},\n\nI hope this finds you well.\n\nBest,\nShaun"},
    {day:3,subject:"Following up",body:"Hi {{name}},\n\nJust following up on my previous message.\n\nBest,\nShaun"},
    {day:7,subject:"Last chase",body:"Hi {{name}},\n\nI wanted to reach out one more time.\n\nBest,\nShaun"},
  ],status:"active"};
  const [f,setF]=useState(blank);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");

  const load=useCallback(async()=>{
    setLoading(true);
    const[{data:seqs},{data:cands},{data:cos}]=await Promise.all([
      db.from("email_sequences").select("*").order("created_at",{ascending:false}),
      db.from("candidates").select("id,name").order("name"),
      db.from("companies").select("id,name").order("name"),
    ]);
    setRows(seqs||[]);setCandidates(cands||[]);setCompanies(cos||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    if(!f.name.trim())return setErr("Name required");
    setSaving(true);setErr("");
    const{error}=await db.from("email_sequences").insert({...f,steps:JSON.stringify(f.steps)});
    if(error)setErr(error.message);else{setModal(false);setF(blank);load();}
    setSaving(false);
  };

  const del=async id=>{if(!confirm("Delete sequence?"))return;await db.from("email_sequences").delete().eq("id",id);load();};

  const targets=f.target_type==="candidate"?candidates:companies;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:15,fontWeight:500}}>Email Sequences</div>
      <button className="btn-a" onClick={()=>{setF(blank);setModal(true);}}>+ New Sequence</button>
    </div>
    <div style={{background:"#faeeda",border:"0.5px solid #e8c97a",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#854f0b",marginBottom:14}}>
      ℹ️ Sequences are a planning tool — use them to track your outreach schedule. Copy the email body and send manually via Outlook.
    </div>
    {loading?<Spin/>:
    rows.length===0?<div style={{color:"var(--t3)",fontSize:13,padding:"40px 0",textAlign:"center"}}>No sequences yet. Click "+ New Sequence" to create one.</div>:
    <div style={{display:"grid",gap:10}}>
      {rows.map(r=>{
        const steps=typeof r.steps==="string"?JSON.parse(r.steps):r.steps||[];
        return <div key={r.id} style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:500,fontSize:14}}>{r.name}</div>
              <div style={{fontSize:11,color:"var(--t2)",marginTop:2}}>{r.target_type} · Started {r.started_date}</div>
            </div>
            <button className="btn-d" onClick={()=>del(r.id)}>Delete</button>
          </div>
          <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
            {steps.map((step,i)=><div key={i} style={{background:"var(--bg2)",borderRadius:8,padding:"8px 12px",border:"0.5px solid var(--br)",minWidth:120}}>
              <div style={{fontSize:10,color:"var(--t3)",marginBottom:2}}>Day {step.day}</div>
              <div style={{fontSize:12,fontWeight:500}}>{step.subject}</div>
            </div>)}
          </div>
        </div>;
      })}
    </div>}
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}>
      <div className="modal" style={{maxWidth:600}} onClick={e=>e.stopPropagation()}>
        <h3>New Email Sequence</h3>
        <div className="fr"><label>Sequence Name</label><input value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="e.g. Ecologist BD outreach"/></div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Target Type</label>
            <select value={f.target_type} onChange={e=>setF(p=>({...p,target_type:e.target.value,target_id:"",target_name:""}))}>
              <option value="candidate">Candidate</option><option value="company">Company</option>
            </select>
          </div>
          <div className="fr" style={{margin:0}}><label>Target</label>
            <select value={f.target_id} onChange={e=>{
              const t=targets.find(x=>x.id===e.target.value);
              setF(p=>({...p,target_id:e.target.value,target_name:t?.name||""}));
            }}>
              <option value="">Select…</option>
              {targets.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}

          </div>
        </div>
        <div style={{fontSize:12,fontWeight:500,marginBottom:8,marginTop:4}}>Steps</div>
        {f.steps.map((step,i)=><div key={i} style={{background:"var(--bg2)",borderRadius:8,padding:12,marginBottom:8,border:"0.5px solid var(--br)"}}>
          <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
            <div style={{fontSize:11,color:"var(--t2)",whiteSpace:"nowrap"}}>Day:</div>

            <div style={{fontSize:11,color:"var(--t2)",whiteSpace:"nowrap"}}>Subject:</div>
            <input value={step.subject} onChange={e=>{const st=[...f.steps];st[i]={...st[i],subject:e.target.value};setF(p=>({...p,steps:st}));}}/>
          </div>
          <textarea value={step.body} onChange={e=>{const st=[...f.steps];st[i]={...st[i],body:e.target.value};setF(p=>({...p,steps:st}));}} style={{minHeight:80,fontSize:12}}/>
        </div>)}
        {err&&<div className="err">{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn-o" onClick={()=>setModal(false)}>Cancel</button>
          <button className="btn-a" onClick={save} disabled={saving}>{saving?"Saving…":"Create Sequence"}</button>
        </div>
      </div>
    </div>}
  </div>;
}

// FEATURE 4: PLACEMENTS
// ============================================================
function PlacementsPage(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [candidates,setCandidates]=useState([]);
  const [jobs,setJobs]=useState([]);
  const blank={candidate_id:"",job_id:"",candidate_name:"",job_title:"",company_name:"",start_date:"",salary:"",fee_amount:"",fee_percentage:"",invoice_date:"",invoice_number:"",payment_received:false,payment_date:"",notes:""};
  const [f,setF]=useState(blank);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));

  const load=useCallback(async()=>{
    setLoading(true);
    const[{data:pl},{data:cands},{data:js}]=await Promise.all([
      db.from("placements").select("*").order("created_at",{ascending:false}),
      db.from("candidates").select("id,name").order("name"),
      db.from("jobs").select("id,title,companies(name)").order("title"),
    ]);
    setRows(pl||[]);setCandidates(cands||[]);setJobs(js||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    if(!f.candidate_name.trim())return setErr("Candidate name required");
    setSaving(true);setErr("");
    const payload={
      candidate_id:f.candidate_id||null,
      job_id:f.job_id||null,
      candidate_name:f.candidate_name.trim(),
      job_title:f.job_title.trim(),
      company_name:f.company_name.trim(),
      start_date:f.start_date||null,
      salary:f.salary?parseFloat(f.salary):null,
      fee_amount:f.fee_amount?parseFloat(f.fee_amount):null,
      fee_percentage:f.fee_percentage?parseFloat(f.fee_percentage):null,
      invoice_date:f.invoice_date||null,
      invoice_number:f.invoice_number.trim()||null,
      payment_received:f.payment_received==="true"||f.payment_received===true,
      payment_date:f.payment_date||null,
      notes:f.notes.trim()||null,
    };
    const{error}=await db.from("placements").insert(payload);
    if(error)setErr(error.message);else{setModal(false);setF(blank);load();}
    setSaving(false);
  };

  const togglePaid=async(id,val)=>{await db.from("placements").update({payment_received:val,payment_date:val?new Date().toISOString().split("T")[0]:null}).eq("id",id);load();};

  const totalFees=rows.reduce((sum,r)=>sum+(parseFloat(r.fee_amount)||0),0);
  const paidFees=rows.filter(r=>r.payment_received).reduce((sum,r)=>sum+(parseFloat(r.fee_amount)||0),0);

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:15,fontWeight:500}}>Placements</div>
      <button className="btn-a" onClick={()=>{setF(blank);setModal(true);}}>+ Record Placement</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}}>
      <div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:14}}>
        <div style={{fontSize:11,color:"var(--t2)",marginBottom:4}}>TOTAL PLACEMENTS</div>
        <div style={{fontSize:24,fontWeight:700,color:"var(--t1)"}}>{rows.length}</div>
      </div>
      <div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:14}}>
        <div style={{fontSize:11,color:"var(--t2)",marginBottom:4}}>TOTAL FEES</div>
        <div style={{fontSize:24,fontWeight:700,color:"#185fa5"}}>£{totalFees.toLocaleString()}</div>
      </div>
      <div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:14}}>
        <div style={{fontSize:11,color:"var(--t2)",marginBottom:4}}>FEES RECEIVED</div>
        <div style={{fontSize:24,fontWeight:700,color:"#3b6d11"}}>£{paidFees.toLocaleString()}</div>
      </div>
    </div>
    {loading?<Spin/>:
    rows.length===0?<div style={{color:"var(--t3)",fontSize:13,padding:"40px 0",textAlign:"center"}}>No placements yet. Click "Record Placement" to add your first.</div>:
    <table style={{width:"100%",borderCollapse:"collapse",background:"var(--bg)",borderRadius:10,overflow:"hidden",border:"0.5px solid var(--br)",tableLayout:"fixed"}}>
      <colgroup>
        <col style={{width:"14%"}}/><col style={{width:"18%"}}/><col style={{width:"14%"}}/>
        <col style={{width:"10%"}}/><col style={{width:"10%"}}/><col style={{width:"10%"}}/>
        <col style={{width:"12%"}}/><col style={{width:"12%"}}/>
      </colgroup>
      <thead><tr>
        <th className="th">Candidate</th><th className="th">Role</th><th className="th">Company</th>
        <th className="th">Start Date</th><th className="th">Salary</th><th className="th">Fee</th>
        <th className="th">Invoice</th><th className="th">Paid</th>
      </tr></thead>
      <tbody>{rows.map(r=><tr key={r.id}>
        <td className="td" style={{fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.candidate_name}</td>
        <td className="td" style={{color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.job_title}</td>
        <td className="td" style={{color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.company_name}</td>
        <td className="td" style={{color:"var(--t3)"}}>{r.start_date||"—"}</td>
        <td className="td">{r.salary?`£${parseFloat(r.salary).toLocaleString()}`:"—"}</td>
        <td className="td" style={{color:"#185fa5",fontWeight:500}}>{r.fee_amount?`£${parseFloat(r.fee_amount).toLocaleString()}`:"—"}</td>
        <td className="td" style={{fontSize:11,color:"var(--t3)"}}>{r.invoice_number||"—"}</td>
        <td className="td">
          <button onClick={()=>togglePaid(r.id,!r.payment_received)} style={{background:r.payment_received?"#eaf3de":"#fcebeb",color:r.payment_received?"#3b6d11":"#a32d2d",border:"none",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>
            {r.payment_received?"✓ Paid":"Unpaid"}
          </button>
        </td>
      </tr>)}</tbody>
    </table>}
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>Record Placement</h3>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Candidate Name *</label>
            <input value={f.candidate_name} onChange={s("candidate_name")} placeholder="Full name" list="placement-candidates"/>
            <datalist id="placement-candidates">
              {candidates.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
            </datalist>
          </div>
          <div className="fr" style={{margin:0}}><label>Job Title</label><input value={f.job_title} onChange={s("job_title")}/></div>
        </div>
        <div className="fr"><label>Company</label>
          <input value={f.company_name} onChange={s("company_name")} list="placement-companies"/>
          <datalist id="placement-companies">
            {jobs.map(j=>j.companies?.name).filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i).map(n=><option key={n} value={n}/>)}
          </datalist>
        </div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Start Date</label><input type="date" value={f.start_date} onChange={s("start_date")}/></div>
          <div className="fr" style={{margin:0}}><label>Salary (£)</label><input value={f.salary} onChange={s("salary")} placeholder="45000"/></div>
        </div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Fee Amount (£)</label><input value={f.fee_amount} onChange={s("fee_amount")} placeholder="6300"/></div>
          <div className="fr" style={{margin:0}}><label>Fee %</label><input value={f.fee_percentage} onChange={s("fee_percentage")} placeholder="14"/></div>
        </div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Invoice Date</label><input type="date" value={f.invoice_date} onChange={s("invoice_date")}/></div>
          <div className="fr" style={{margin:0}}><label>Invoice Number</label><input value={f.invoice_number} onChange={s("invoice_number")} placeholder="INV-001"/></div>
        </div>
        <div className="fr"><label>Notes</label><textarea value={f.notes} onChange={s("notes")}/></div>
        {err&&<div className="err">{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn-o" onClick={()=>setModal(false)}>Cancel</button>
          <button className="btn-a" onClick={save} disabled={saving}>{saving?"Saving…":"Save Placement"}</button>
        </div>
      </div>
    </div>}
  </div>;
}

const ACTIVITY_TYPES=["Note","Call","Email","Meeting","LinkedIn","WhatsApp"];
const ACTIVITY_ICONS={"Note":"📝","Call":"📞","Email":"✉️","Meeting":"🤝","LinkedIn":"💼","WhatsApp":"💬"};

function ActivityLogPage(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [candidates,setCandidates]=useState([]);
  const [companies,setCompanies]=useState([]);
  const blank={entity_type:"candidate",entity_id:"",entity_name:"",activity_type:"Note",subject:"",body:""};
  const [f,setF]=useState(blank);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [filter,setFilter]=useState("All");

  const load=useCallback(async()=>{
    setLoading(true);
    const[{data:acts},{data:cands},{data:cos}]=await Promise.all([
      db.from("activity_log").select("*").order("created_at",{ascending:false}).limit(100),
      db.from("candidates").select("id,name").order("name"),
      db.from("companies").select("id,name").order("name"),
    ]);
    setRows(acts||[]);setCandidates(cands||[]);setCompanies(cos||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    if(!f.body.trim())return setErr("Please add a note");
    setSaving(true);setErr("");
    const{error}=await db.from("activity_log").insert(f);
    if(error)setErr(error.message);else{setModal(false);setF(blank);load();}
    setSaving(false);
  };

  const targets=f.entity_type==="candidate"?candidates:companies;
  const filtered=filter==="All"?rows:rows.filter(r=>r.activity_type===filter);

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:15,fontWeight:500}}>Activity Log</div>
      <button className="btn-a" onClick={()=>{setF(blank);setModal(true);}}>+ Log Activity</button>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      {["All",...ACTIVITY_TYPES].map(t=><button key={t} onClick={()=>setFilter(t)} style={{background:filter===t?"#1a1f2e":"var(--bg)",color:filter===t?"#fff":"var(--t2)",border:"0.5px solid var(--br)",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>
        {ACTIVITY_ICONS[t]||""} {t}
      </button>)}
    </div>
    {loading?<Spin/>:
    filtered.length===0?<div style={{padding:"40px 0",textAlign:"center",color:"var(--t3)",fontSize:13}}>No activities yet. Click "Log Activity" to start tracking.</div>:
    <div style={{display:"grid",gap:8}}>
      {filtered.map(r=><div key={r.id} style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:"12px 14px",display:"flex",gap:12}}>
        <div style={{fontSize:20,flexShrink:0}}>{ACTIVITY_ICONS[r.activity_type]||"📝"}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
            <div style={{fontWeight:500,fontSize:13}}>{r.entity_name||r.entity_type} <span style={{fontSize:11,color:"var(--t3)",fontWeight:400}}>· {r.activity_type}</span></div>
            <div style={{fontSize:11,color:"var(--t3)"}}>{new Date(r.created_at).toLocaleDateString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
          </div>
          {r.subject&&<div style={{fontSize:12,fontWeight:500,color:"var(--t2)",marginBottom:2}}>{r.subject}</div>}
          <div style={{fontSize:12,color:"var(--t2)",whiteSpace:"pre-wrap"}}>{r.body}</div>
        </div>
      </div>)}
    </div>}
    {modal&&<div className="modal-overlay" onClick={()=>setModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>Log Activity</h3>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Type</label>
            <select value={f.entity_type} onChange={e=>setF(p=>({...p,entity_type:e.target.value,entity_id:"",entity_name:""}))}>
              <option value="candidate">Candidate</option><option value="company">Company</option>
            </select>
          </div>
          <div className="fr" style={{margin:0}}><label>Contact</label>
            <select value={f.entity_id} onChange={e=>{
              const t=targets.find(x=>x.id===e.target.value);
              setF(p=>({...p,entity_id:e.target.value,entity_name:t?.name||""}));
            }}>
              <option value="">Select…</option>
              {targets.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
        </div>
        <div className="fr2">
          <div className="fr" style={{margin:0}}><label>Activity</label>
            <select value={f.activity_type} onChange={e=>setF(p=>({...p,activity_type:e.target.value}))}>
              {ACTIVITY_TYPES.map(x=><option key={x}>{x}</option>)}
            </select>
          </div>
          <div className="fr" style={{margin:0}}><label>Subject</label><input value={f.subject} onChange={e=>setF(p=>({...p,subject:e.target.value}))} placeholder="Brief subject…"/></div>
        </div>
        <div className="fr"><label>Notes *</label><textarea value={f.body} onChange={e=>setF(p=>({...p,body:e.target.value}))} placeholder="What happened? Key points from the conversation…" style={{minHeight:100}}/></div>
        {err&&<div className="err">{err}</div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
          <button className="btn-o" onClick={()=>setModal(false)}>Cancel</button>
          <button className="btn-a" onClick={save} disabled={saving}>{saving?"Saving…":"Log Activity"}</button>
        </div>
      </div>
    </div>}
  </div>;
}

// FEATURE 6: REPORTING DASHBOARD
// ============================================================
function ReportingPage(){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [period,setPeriod]=useState("month");

  const load=useCallback(async()=>{
    setLoading(true);
    const now=new Date();
    let from;
    if(period==="week"){from=new Date(now-7*86400000).toISOString();}
    else if(period==="month"){from=new Date(now.getFullYear(),now.getMonth(),1).toISOString();}
    else{from=new Date(now.getFullYear(),0,1).toISOString();}

    const[
      {count:totalCandidates},{count:totalJobs},{count:totalCompanies},
      {data:newCandidates},{data:submittals},{data:placements},{data:activities},{data:bdLeads}
    ]=await Promise.all([
      db.from("candidates").select("*",{count:"exact",head:true}),
      db.from("jobs").select("*",{count:"exact",head:true}),
      db.from("companies").select("*",{count:"exact",head:true}),
      db.from("candidates").select("id,created_at").gte("created_at",from),
      db.from("submittals").select("id,status,created_at").gte("created_at",from),
      db.from("placements").select("id,fee_amount,payment_received,created_at").gte("created_at",from),
      db.from("activity_log").select("id,activity_type,created_at").gte("created_at",from),
      db.from("client_pipeline").select("id,stage"),
    ]);

    const fees=(placements||[]).reduce((s,p)=>s+(parseFloat(p.fee_amount)||0),0);
    const paidFees=(placements||[]).filter(p=>p.payment_received).reduce((s,p)=>s+(parseFloat(p.fee_amount)||0),0);
    const interviews=(submittals||[]).filter(s=>["Interview Booked","Offer Made","Placed"].includes(s.status)).length;
    const offers=(submittals||[]).filter(s=>["Offer Made","Placed"].includes(s.status)).length;
    const placed=(submittals||[]).filter(s=>s.status==="Placed").length;
    const actByType=(activities||[]).reduce((a,x)=>{a[x.activity_type]=(a[x.activity_type]||0)+1;return a;},{});
    const bdByStage=(bdLeads||[]).reduce((a,x)=>{a[x.stage]=(a[x.stage]||0)+1;return a;},{});

    setData({totalCandidates,totalJobs,totalCompanies,newCandidates:newCandidates?.length||0,
      submittals:submittals?.length||0,interviews,offers,placed,fees,paidFees,
      actByType,bdByStage,activities:activities?.length||0});
    setLoading(false);
  },[period]);
  useEffect(()=>{load();},[load]);

  const StatBox=({label,value,sub,color})=><div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:14}}>
    <div style={{fontSize:11,color:"var(--t2)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.4px"}}>{label}</div>
    <div style={{fontSize:26,fontWeight:700,color:color||"var(--t1)"}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>{sub}</div>}
  </div>;

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:15,fontWeight:500}}>Reporting</div>
      <div style={{display:"flex",gap:6}}>
        {["week","month","year"].map(p=><button key={p} onClick={()=>setPeriod(p)} style={{background:period===p?"#1a1f2e":"var(--bg)",color:period===p?"#fff":"var(--t2)",border:"0.5px solid var(--br)",borderRadius:6,padding:"4px 12px",fontSize:11,cursor:"pointer",textTransform:"capitalize"}}>{p}</button>)}
      </div>
    </div>
    {loading||!data?<Spin/>:<>
      {/* KPI row 1 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        <StatBox label="Total Candidates" value={data.totalCandidates||0}/>
        <StatBox label="Total Jobs" value={data.totalJobs||0}/>
        <StatBox label="Total Companies" value={data.totalCompanies||0}/>
        <StatBox label="New Candidates" value={data.newCandidates} sub={`This ${period}`} color="#185fa5"/>
      </div>
      {/* KPI row 2 — pipeline funnel */}
      <div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--t2)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.4px",fontWeight:500}}>Recruitment funnel — this {period}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {[
            {label:"CVs Sent",value:data.submittals,color:"#854f0b",bg:"#faeeda"},
            {label:"Interviews",value:data.interviews,color:"#185fa5",bg:"#e6f1fb"},
            {label:"Offers Made",value:data.offers,color:"#993556",bg:"#fbeaf0"},
            {label:"Placed",value:data.placed,color:"#3b6d11",bg:"#eaf3de"},
          ].map((item,i,arr)=>{
            const max=arr[0].value||1;
            const pct=Math.round((item.value/max)*100)||0;
            return <div key={item.label} style={{textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:700,color:item.color,marginBottom:4}}>{item.value}</div>
              <div style={{height:6,background:"var(--bg2)",borderRadius:10,marginBottom:6,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:item.color,borderRadius:10,transition:"width 0.6s"}}/>
              </div>
              <div style={{fontSize:11,color:"var(--t2)"}}>{item.label}</div>
              {i>0&&arr[i-1].value>0&&<div style={{fontSize:10,color:"var(--t3)",marginTop:2}}>{Math.round((item.value/arr[i-1].value)*100)}% conversion</div>}
            </div>;
          })}
        </div>
      </div>
      {/* Fees + Activity */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:16}}>
          <div style={{fontSize:11,color:"var(--t2)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.4px",fontWeight:500}}>Fees — this {period}</div>
          <div style={{fontSize:28,fontWeight:700,color:"#185fa5",marginBottom:2}}>£{data.fees.toLocaleString()}</div>
          <div style={{fontSize:12,color:"var(--t3)",marginBottom:10}}>Total invoiced</div>
          <div style={{background:"var(--bg2)",borderRadius:8,padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}>
              <span style={{color:"var(--t2)"}}>Received</span>
              <span style={{fontWeight:600,color:"#3b6d11"}}>£{data.paidFees.toLocaleString()}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
              <span style={{color:"var(--t2)"}}>Outstanding</span>
              <span style={{fontWeight:600,color:"#a32d2d"}}>£{(data.fees-data.paidFees).toLocaleString()}</span>
            </div>
            <div style={{marginTop:10,background:"var(--bg3)",borderRadius:6,height:8,overflow:"hidden"}}>
              <div style={{height:"100%",width:data.fees>0?`${Math.min(100,(data.paidFees/data.fees)*100)}%`:"0%",background:"#3b6d11",borderRadius:6,transition:"width 0.6s"}}/>
            </div>
            <div style={{fontSize:10,color:"var(--t3)",marginTop:4,textAlign:"right"}}>{data.fees>0?Math.round((data.paidFees/data.fees)*100):0}% collected</div>
          </div>
        </div>
        <div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:16}}>
          <div style={{fontSize:11,color:"var(--t2)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.4px",fontWeight:500}}>Activity breakdown — this {period}</div>
          {Object.entries(data.actByType).length===0
            ?<div style={{color:"var(--t3)",fontSize:12,padding:"20px 0",textAlign:"center"}}>No activity logged this {period}</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {Object.entries(data.actByType).sort((a,b)=>b[1]-a[1]).map(([type,count])=>{
                const maxAct=Math.max(...Object.values(data.actByType));
                return <div key={type}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12}}>
                    <span>{ACTIVITY_ICONS[type]||"📝"} {type}</span>
                    <span style={{fontWeight:600}}>{count}</span>
                  </div>
                  <div style={{height:5,background:"var(--bg2)",borderRadius:10,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.round((count/maxAct)*100)}%`,background:ACCENT,borderRadius:10}}/>
                  </div>
                </div>;
              })}
            </div>
          }
        </div>
      </div>
      {/* BD Pipeline Summary */}
      <div style={{background:"var(--bg)",borderRadius:10,border:"0.5px solid var(--br)",padding:16}}>
        <div style={{fontSize:11,color:"var(--t2)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.4px",fontWeight:500}}>BD Pipeline summary</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}}>
          {BD_STAGES.map(stage=>{
            const count=data.bdByStage[stage]||0;
            const total=Object.values(data.bdByStage).reduce((a,b)=>a+b,0)||1;
            return <div key={stage} style={{textAlign:"center"}}>
              <div style={{fontSize:22,fontWeight:700,color:BD_FG[stage],marginBottom:4}}>{count}</div>
              <div style={{height:40,background:"var(--bg2)",borderRadius:6,marginBottom:6,overflow:"hidden",display:"flex",alignItems:"flex-end"}}>
                <div style={{width:"100%",height:`${Math.max(4,Math.round((count/total)*100))}%`,background:BD_COLORS[stage],transition:"height 0.6s"}}/>
              </div>
              <div style={{fontSize:10,color:"var(--t2)",lineHeight:1.3}}>{stage}</div>
            </div>;
          })}
        </div>
      </div>
    </>}
  </div>;
}

function ReminderBell({tasks,onNavigate}){
  const today=todayStr();
  const overdue=(tasks||[]).filter(t=>!t.done&&t.due_date&&t.due_date<today);
  const dueToday=(tasks||[]).filter(t=>!t.done&&t.due_date===today);
  const total=overdue.length+dueToday.length;
  return <div onClick={onNavigate} style={{position:"relative",cursor:"pointer",padding:"4px 6px"}}>
    <span style={{fontSize:18}}>🔔</span>
    {total>0&&<span style={{position:"absolute",top:0,right:0,background:overdue.length>0?"#e24b4a":ACCENT,color:"#fff",fontSize:9,fontWeight:700,borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center"}}>{total>9?"9+":total}</span>}
  </div>;
}

const CRM_PASSWORD = "Danielleisthebest_123";

function LoginScreen({onLogin}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const attempt=()=>{
    if(pw===CRM_PASSWORD){onLogin();}
    else{setErr(true);setTimeout(()=>setErr(false),2000);}
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#1a1f2e"}}>
      <div style={{background:"#fff",borderRadius:16,padding:"40px 36px",width:340,boxShadow:"0 8px 40px rgba(0,0,0,0.3)",textAlign:"center"}}>
        <div style={{fontSize:22,fontWeight:700,color:"#1a1f2e",marginBottom:4,letterSpacing:0.5}}>recruit<span style={{color:"#4f6ef7"}}>CRM</span></div>
        <div style={{fontSize:12,color:"#9e9e9b",marginBottom:28}}>Gaia Search · Private Access</div>
        <input
          type="password"
          placeholder="Enter password"
          value={pw}
          onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:`1.5px solid ${err?"#e53935":"#ddd"}`,fontSize:14,outline:"none",marginBottom:12,boxSizing:"border-box",transition:"border 0.2s"}}
          autoFocus
        />
        {err&&<div style={{color:"#e53935",fontSize:12,marginBottom:8}}>Incorrect password</div>}
        <button onClick={attempt} style={{width:"100%",padding:"10px",background:"#1a1f2e",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer"}}>
          Sign in
        </button>
      </div>
    </div>
  );
}

function App(){
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem("crm_auth")==="1");

<script>
function saveKey(){
  const k=document.getElementById("apiKeyInput").value.trim();
  if(!k)return;
  window._apiKey=k;localStorage.setItem("rcrm_key",k);
  document.getElementById("keyStatus").innerHTML='<span style="color:#3b6d11">✓ Saved</span>';
  document.getElementById("apiKeyInput").value="••••••••••••••••••";
  setTimeout(()=>{document.getElementById("apiBanner").style.display="none";},800);
}
window.addEventListener("load",()=>{
  const s=localStorage.getItem("rcrm_key");
  if(s){
    window._apiKey=s;
    document.getElementById("apiBanner").style.display="none";
  }
});
</script>
